name: tvOS TestFlight Deployment

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      force_write:
        description: 'Force certificate creation (first time setup)'
        required: false
        default: false
        type: boolean

env:
  RUBY_VERSION: '3.2'
  UNITY_VERSION: '6000.4.1f1'
  UNITY_CHANGESET: '8535861f39e1'

jobs:
  # Tests run separately via test.yml — this workflow focuses on build + deploy
  build-and-deploy:
    name: Build & Deploy to TestFlight
    runs-on: macos-26
    timeout-minutes: 90
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Cache Unity .pkg installers to skip re-downloading (~5GB)
      - name: Cache Unity installers
        id: cache-unity-pkg
        uses: actions/cache@v4
        with:
          path: /tmp/unity-installers
          key: unity-pkg-${{ env.UNITY_VERSION }}-tvos

      - name: Download Unity installers
        if: steps.cache-unity-pkg.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/unity-installers
          echo "Downloading Unity Editor..."
          curl -L -o /tmp/unity-installers/Unity.pkg \
            "https://download.unity3d.com/download_unity/${{ env.UNITY_CHANGESET }}/MacEditorInstaller/Unity.pkg"
          echo "Downloading tvOS support module..."
          curl -L -o /tmp/unity-installers/UnitySetup-AppleTV.pkg \
            "https://download.unity3d.com/download_unity/${{ env.UNITY_CHANGESET }}/MacEditorTargetInstaller/UnitySetup-AppleTV-Support-for-Editor-${{ env.UNITY_VERSION }}.pkg"
          ls -lh /tmp/unity-installers/

      - name: Install Unity
        run: |
          echo "Installing Unity Editor..."
          sudo installer -pkg /tmp/unity-installers/Unity.pkg -target /
          echo "Installing tvOS support..."
          sudo installer -pkg /tmp/unity-installers/UnitySetup-AppleTV.pkg -target /
          # Find the installed Unity editor
          UNITY_PATH=$(find /Applications/Unity -name "Unity" -type f -path "*/Unity.app/Contents/MacOS/Unity" 2>/dev/null | head -1)
          echo "UNITY_EDITOR=$UNITY_PATH" >> $GITHUB_ENV
          echo "Unity installed at: $UNITY_PATH"

      - name: Activate Unity license
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        run: |
          LICENSING_CLIENT=$(find /Applications/Unity -name "Unity.Licensing.Client" -type f 2>/dev/null | head -1)
          echo "Found licensing client at: $LICENSING_CLIENT"
          "$LICENSING_CLIENT" \
            --activate-all \
            --include-personal \
            --username "$UNITY_EMAIL" \
            --password "$UNITY_PASSWORD"

      - name: Build tvOS Xcode project
        env:
          GRAFANA_LOKI_URL: ${{ secrets.GRAFANA_LOKI_URL }}
          GRAFANA_LOKI_USER: ${{ secrets.GRAFANA_LOKI_USER }}
          GRAFANA_LOKI_TOKEN: ${{ secrets.GRAFANA_LOKI_TOKEN }}
        run: |
          # Move test assemblies out of Assets to prevent compilation errors
          # (test packages may not be available in the build-only Unity install)
          mkdir -p /tmp/tests-backup
          mv Assets/Tests /tmp/tests-backup/ || true
          "$UNITY_EDITOR" \
            -batchmode \
            -nographics \
            -quit \
            -executeMethod SnakeGame.Editor.BuildScript.BuildTvOS \
            -projectPath "$GITHUB_WORKSPACE" \
            -logFile -
          # Restore tests
          mv /tmp/tests-backup/Tests Assets/ || true
          echo "Build output:"
          ls -la build/tvOS/ 2>/dev/null || echo "No build output found"

      - name: Generate app icon from SVG
        run: |
          # Install rsvg-convert for SVG→PNG
          brew install librsvg 2>/dev/null || true
          SVG="Assets/AppIcon/snake_icon.svg"
          ICONS_DIR=$(find build/tvOS -path "*/Images.xcassets/AppIcon.brandassets" -type d | head -1)
          if [ -n "$ICONS_DIR" ] && [ -f "$SVG" ]; then
            # Generate all required tvOS icon sizes with opaque background
            # App Icon small: 400x240, large: 1280x768
            # Top Shelf: 1920x720 (standard), 2320x720 (wide), 4640x1440 (wide 2x)
            for dir in "$ICONS_DIR"/*/; do
              find "$dir" -name "*.png" | while read png; do
                # Get dimensions of existing placeholder
                W=$(sips -g pixelWidth "$png" 2>/dev/null | tail -1 | awk '{print $2}')
                H=$(sips -g pixelHeight "$png" 2>/dev/null | tail -1 | awk '{print $2}')
                if [ -n "$W" ] && [ -n "$H" ] && [ "$W" -gt 0 ]; then
                  # Render SVG centered on dark green background at this size
                  rsvg-convert "$SVG" -w "$W" -h "$H" --keep-aspect-ratio -o /tmp/icon_fg.png 2>/dev/null
                  # Create solid background
                  sips -s format png -z "$H" "$W" --setProperty formatOptions 100 "$png" --out /tmp/icon_bg.png 2>/dev/null || true
                  # Use Python to composite snake on dark background
                  python3 -c "
from PIL import Image
bg = Image.new('RGB', ($W, $H), (30, 80, 30))
try:
    fg = Image.open('/tmp/icon_fg.png').convert('RGBA')
    # Center the snake
    ox = ($W - fg.width) // 2
    oy = ($H - fg.height) // 2
    bg.paste(fg, (ox, oy), fg)
except: pass
bg.save('$png')
" 2>/dev/null || cp /tmp/icon_fg.png "$png" 2>/dev/null || true
                  echo "Generated icon: $png (${W}x${H})"
                fi
              done
            done
          else
            echo "No icon dir found or SVG missing, skipping icon generation"
          fi

      - name: Set export compliance in ALL Info.plist files
        run: |
          # Set ITSAppUsesNonExemptEncryption=false in EVERY Info.plist in the
          # Xcode project. This must be in the source plist before xcodebuild
          # archive, so it's baked into the final IPA. Apple reads this at
          # processing time — it's the only reliable way to skip compliance.
          find build/tvOS -name "Info.plist" | while read plist; do
            /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$plist" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" "$plist"
            echo "Set ITSAppUsesNonExemptEncryption=false in $plist"
          done

      - name: Fix tvOS image assets (remove alpha channels)
        run: |
          # tvOS requires opaque images for Top Shelf, icons, and launch images.
          # Unity generates placeholders with alpha channels which Apple rejects.
          # Find and fix ALL PNGs in the Xcode project (Images.xcassets, not Assets.xcassets)
          find build/tvOS -name "*.png" | while read png; do
            # Check if image has alpha using sips
            has_alpha=$(sips -g hasAlpha "$png" 2>/dev/null | grep "yes" || true)
            if [ -n "$has_alpha" ]; then
              echo "Stripping alpha: $png"
              # Convert to JPEG then back to PNG to strip alpha
              sips -s format jpeg "$png" --out /tmp/noalpha.jpg 2>/dev/null
              sips -s format png /tmp/noalpha.jpg --out "$png" 2>/dev/null
              rm -f /tmp/noalpha.jpg
            fi
          done
          echo "Done fixing image assets"

      - name: Generate build number
        id: build_number
        run: |
          BUILD_NUMBER=$(date +%Y%m%d%H%M%S)
          echo "build_number=${BUILD_NUMBER}" >> $GITHUB_OUTPUT

      - name: Select Xcode and install tvOS platform
        run: |
          sudo xcode-select -s /Applications/Xcode_26.app || sudo xcode-select -s /Applications/Xcode_16.4.app || sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version
          # Always download tvOS platform — even if SDK shows in showsdks,
          # it may not be registered as an installed platform
          echo "Downloading tvOS platform..."
          xcodebuild -downloadPlatform tvOS 2>&1 || true
          echo "Verifying tvOS SDK:"
          xcodebuild -showsdks | grep tvos

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - name: Setup SSH Deploy Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.FASTLANE_MATCH_DEPLOY_KEY }}" > ~/.ssh/match_deploy_key
          chmod 600 ~/.ssh/match_deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          cat > ~/.ssh/config << SSHEOF
          Host github.com
            HostName github.com
            User git
            IdentityFile ~/.ssh/match_deploy_key
            IdentitiesOnly yes
          SSHEOF
          chmod 600 ~/.ssh/config

      - name: Setup Keychain
        run: |
          security create-keychain -p "" build.keychain
          security list-keychains -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

      - name: Generate certificates and profiles
        run: bundle exec fastlane certificates_distribution
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
          MATCH_PASSWORD: ${{ secrets.FASTLANE_MATCH_PASSWORD }}
          GIT_SSH_COMMAND: "ssh -i ~/.ssh/match_deploy_key -o IdentitiesOnly=yes"
          MATCH_GIT_URL: ${{ secrets.FASTLANE_MATCH_GIT_URL }}
          MATCH_FORCE_WRITE: ${{ github.event.inputs.force_write || 'false' }}

      - name: Build and upload to TestFlight
        run: bundle exec fastlane beta
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
          MATCH_PASSWORD: ${{ secrets.FASTLANE_MATCH_PASSWORD }}
          GIT_SSH_COMMAND: "ssh -i ~/.ssh/match_deploy_key -o IdentitiesOnly=yes"
          MATCH_GIT_URL: ${{ secrets.FASTLANE_MATCH_GIT_URL }}
          MATCH_FORCE_WRITE: ${{ github.event.inputs.force_write || 'false' }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Upload build artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: tvos-build-logs
          path: |
            build/**/*.log
            ~/Library/Logs/gym/**
          retention-days: 5

      - name: Deployment summary
        if: success()
        run: |
          echo "## tvOS Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Number**: ${{ steps.build_number.outputs.build_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "- **Distribution**: External TestFlight Release" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Distribution**: Internal TestFlight Build" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Cleanup Keychain
        if: always()
        run: security delete-keychain build.keychain || true

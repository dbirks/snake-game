name: tvOS TestFlight Deployment

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      force_write:
        description: 'Force certificate creation (first time setup)'
        required: false
        default: false
        type: boolean

env:
  RUBY_VERSION: '3.2'
  UNITY_VERSION: '6000.3.11f1'

jobs:
  # Run EditMode tests first (cheap Linux runner)
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    container:
      image: unityci/editor:ubuntu-6000.3.11f1-base-3.2.2
    steps:
      - uses: actions/checkout@v4

      - name: Activate Unity license
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        run: |
          /opt/unity/Editor/Data/Resources/Licensing/Client/Unity.Licensing.Client \
            --activate-all \
            --include-personal \
            --username "$UNITY_EMAIL" \
            --password "$UNITY_PASSWORD"

      - name: Run EditMode tests
        run: |
          unity-editor \
            -batchmode \
            -nographics \
            -runTests \
            -testPlatform EditMode \
            -testCategory Core \
            -testResults /results/editmode-results.xml \
            -projectPath . \
            -logFile /dev/stdout \
            -quit || true

  # Build + sign + upload all on macOS (tvOS requires macOS + Xcode)
  build-and-deploy:
    name: Build & Deploy to TestFlight
    needs: [test]
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Unity Hub
        run: |
          brew install --cask unity-hub
          sleep 5

      - name: Install Unity with tvOS module
        run: |
          # 6000.3.11f1 is not in the official release list, so we need the changeset hash
          # Install using the unityhub CLI with changeset
          /Applications/Unity\ Hub.app/Contents/MacOS/Unity\ Hub -- --headless install \
            --version ${{ env.UNITY_VERSION }} \
            --changeset 3000ef702840 \
            --module appletv \
            --childModules || true
          # Wait for install to settle
          sleep 10
          # Find the Unity editor path
          UNITY_PATH=$(find /Applications/Unity/Hub/Editor -name "Unity" -type f -path "*/Unity.app/Contents/MacOS/Unity" 2>/dev/null | head -1)
          if [ -z "$UNITY_PATH" ]; then
            echo "Unity not found, listing what's available:"
            ls -la /Applications/Unity/Hub/Editor/ 2>/dev/null || echo "No editors installed"
            exit 1
          fi
          echo "UNITY_EDITOR=$UNITY_PATH" >> $GITHUB_ENV
          echo "Found Unity at: $UNITY_PATH"

      - name: Activate Unity license
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        run: |
          # Find the licensing client
          LICENSING_CLIENT=$(find /Applications/Unity/Hub/Editor -name "Unity.Licensing.Client" -type f 2>/dev/null | head -1)
          "$LICENSING_CLIENT" \
            --activate-all \
            --include-personal \
            --username "$UNITY_EMAIL" \
            --password "$UNITY_PASSWORD"

      - name: Build tvOS Xcode project
        run: |
          "$UNITY_EDITOR" \
            -batchmode \
            -nographics \
            -quit \
            -executeMethod SnakeGame.Editor.BuildScript.BuildTvOS \
            -projectPath . \
            -logFile -
          ls -la build/tvOS/

      - name: Generate build number
        id: build_number
        run: |
          BUILD_NUMBER=$(date +%Y%m%d%H%M%S)
          echo "build_number=${BUILD_NUMBER}" >> $GITHUB_OUTPUT

      - name: Select Xcode 16
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app || sudo xcode-select -s /Applications/Xcode_16.app
          xcodebuild -version

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - name: Setup SSH Deploy Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.FASTLANE_MATCH_DEPLOY_KEY }}" > ~/.ssh/match_deploy_key
          chmod 600 ~/.ssh/match_deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          cat > ~/.ssh/config << SSHEOF
          Host github.com
            HostName github.com
            User git
            IdentityFile ~/.ssh/match_deploy_key
            IdentitiesOnly yes
          SSHEOF
          chmod 600 ~/.ssh/config

      - name: Setup Keychain
        run: |
          security create-keychain -p "" build.keychain
          security list-keychains -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

      - name: Generate certificates and profiles
        run: bundle exec fastlane certificates_distribution
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
          MATCH_PASSWORD: ${{ secrets.FASTLANE_MATCH_PASSWORD }}
          GIT_SSH_COMMAND: "ssh -i ~/.ssh/match_deploy_key -o IdentitiesOnly=yes"
          MATCH_GIT_URL: ${{ secrets.FASTLANE_MATCH_GIT_URL }}
          MATCH_FORCE_WRITE: ${{ github.event.inputs.force_write || 'false' }}

      - name: Build and upload to TestFlight
        run: bundle exec fastlane beta
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
          MATCH_PASSWORD: ${{ secrets.FASTLANE_MATCH_PASSWORD }}
          GIT_SSH_COMMAND: "ssh -i ~/.ssh/match_deploy_key -o IdentitiesOnly=yes"
          MATCH_GIT_URL: ${{ secrets.FASTLANE_MATCH_GIT_URL }}
          MATCH_FORCE_WRITE: ${{ github.event.inputs.force_write || 'false' }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Upload build artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: tvos-build-logs
          path: |
            build/**/*.log
            ~/Library/Logs/gym/**
          retention-days: 5

      - name: Deployment summary
        if: success()
        run: |
          echo "## tvOS Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Number**: ${{ steps.build_number.outputs.build_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "- **Distribution**: External TestFlight Release" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Distribution**: Internal TestFlight Build" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Cleanup Keychain
        if: always()
        run: security delete-keychain build.keychain || true

name: Unity Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

env:
  UNITY_IMAGE: unityci/editor:ubuntu-6000.4.1f1-base-3.2.2

jobs:
  testEditMode:
    name: EditMode Tests
    runs-on: ubuntu-latest
    container:
      image: unityci/editor:ubuntu-6000.4.1f1-base-3.2.2
    steps:
      - uses: actions/checkout@v4

      - name: Activate Unity license
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        run: |
          /opt/unity/Editor/Data/Resources/Licensing/Client/Unity.Licensing.Client \
            --activate-all \
            --include-personal \
            --username "$UNITY_EMAIL" \
            --password "$UNITY_PASSWORD"

      - name: Run EditMode tests
        run: |
          unity-editor \
            -batchmode \
            -nographics \
            -runTests \
            -testPlatform EditMode \
            -testCategory Core \
            -testResults /results/editmode-results.xml \
            -projectPath . \
            -logFile /dev/stdout \
            -quit || true
          cat /results/editmode-results.xml 2>/dev/null || echo "No results file"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: EditMode-test-results
          path: /results/
          retention-days: 14

  testPlayMode:
    name: PlayMode Tests
    runs-on: ubuntu-latest
    container:
      image: unityci/editor:ubuntu-6000.4.1f1-base-3.2.2
    steps:
      - uses: actions/checkout@v4

      - name: Activate Unity license
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        run: |
          /opt/unity/Editor/Data/Resources/Licensing/Client/Unity.Licensing.Client \
            --activate-all \
            --include-personal \
            --username "$UNITY_EMAIL" \
            --password "$UNITY_PASSWORD"

      - name: Run PlayMode tests
        run: |
          unity-editor \
            -batchmode \
            -nographics \
            -runTests \
            -testPlatform PlayMode \
            -testResults /results/playmode-results.xml \
            -projectPath . \
            -logFile /dev/stdout \
            -quit || true
          cat /results/playmode-results.xml 2>/dev/null || echo "No results file"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: PlayMode-test-results
          path: /results/
          retention-days: 14
